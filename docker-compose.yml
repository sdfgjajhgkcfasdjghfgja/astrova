version: "3.8"

services:
  # 🏭 PulseGuard Industrial IoT Platform
  frontend:
    container_name: pulseguard-frontend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - SENSOR_AUTH_TOKEN=${SENSOR_AUTH_TOKEN:-PULSEGUARD-SENSOR-KEY-2026}
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-pulseguard-telemetry-token-2026}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-pulseguard}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-telemetry}
      - BACKEND_API_URL=http://backend:8000
    restart: unless-stopped
    depends_on:
      - influxdb
      - backend

  # 🐍 PulseGuard Python Machine Health Engine
  backend:
    container_name: pulseguard-python-backend
    build:
      context: ./packages/backend
      dockerfile: ../../packages/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - BACKEND_PORT=8000
    restart: unless-stopped
    depends_on:
      - influxdb

  # 📡 PulseGuard Real-time Sensor Data Simulator
  simulator:
    container_name: pulseguard-sensor-simulator
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python3", "./packages/simulators/telemetry_generator.py"]
    environment:
      - BACKEND_API_URL=http://backend:8000
    restart: unless-stopped
    depends_on:
      - backend

  # 📊 Influx Time-Series Database
  influxdb:
    image: influxdb:2.7-alpine
    container_name: pulseguard-tsdb-influx
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=pulseguard_operator
      - DOCKER_INFLUXDB_INIT_PASSWORD=PulseGuardSecureTsdb2026Password!
      - DOCKER_INFLUXDB_INIT_ORG=pulseguard
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=pulseguard-telemetry-token-2026
    volumes:
      - influxdb-data:/var/lib/influxdb2
    restart: unless-stopped

volumes:
  influxdb-data:
